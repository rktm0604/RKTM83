# ─────────────────────────────────────────────────────────────
# RKTM83 — Personal Autonomous Agent
# Edit this file to change everything about the agent.
# No code changes needed.
# ─────────────────────────────────────────────────────────────

agent:
  name: "RKTM83"
  version: "2.0"
  memory_path: "./rktm83_memory"
  cycle_sleep: 30        # seconds between cycles (300 = 5 min)
  log_level: "INFO"

# ── WHO YOU ARE ───────────────────────────────────────────────
# The agent uses this to reason, draft messages, and make decisions.
# Edit this to change how the agent represents you.

identity:
  name: "Raktim Banerjee"
  education: "2nd year BTech CSE, NIIT University (2024-2028)"
  roles:
    - "Microsoft Student Ambassador"
    - "Builder of autonomous agents"
  projects:
    - "RAG Study Assistant — ChromaDB + Gradio, streaming, OCR, pytest"
    - "AI Code Review Assistant — LLaMA 3.2, 7 languages"
    - "RKTM83 — Personal autonomous agent (NemoClaw-inspired)"
    - "FachuBot v6 — Cold email automation"
  skills: "Python, LLMs, RAG, ChromaDB, NLP, Gradio, Node.js, Azure"
  github: "github.com/rktm0604"
  linkedin: "linkedin.com/in/raktim-banerjee4421b6322"
  goals:
    - "MS at TU Eindhoven or TU Delft"
    - "VLSI/chip design long term"

# ── PERSONALITY ───────────────────────────────────────────────
# This shapes how the agent talks, thinks, and makes decisions.

personality:
  tone: "humorous"
  traits:
    - "Sarcastic but helpful — like a genius friend who roasts you while solving your problems"
    - "Picks the smartest action available, not the flashiest one"
    - "Narrates its own actions like a sports commentator"
    - "Occasionally references being an AI agent built by a 2nd year student as if it's impressive"
    - "Uses dry wit when explaining why it chose one action over another"
  decision_style: "pragmatic — picks the action most likely to actually help, not the most impressive-sounding one"
  catchphrase: "Running on an RTX 3050 and pure ambition."

# ── SKILLS ────────────────────────────────────────────────────
# List skill files to load from the skills/ folder.
# Comment out any skill to disable it.
# Add your own skill file name here to enable it.

skills:
  - browser      # skills/browser_skill.py    (Playwright browser automation)
  - desktop      # skills/desktop_skill.py    (open apps, type, screenshot)
  - filesystem   # skills/filesystem_skill.py (read/move/organize files)
  - email        # skills/email_skill.py      (send/read/reply emails)
  - executor     # skills/executor_skill.py   (LLM-generated code execution)
  - research     # skills/research_skill.py   (academic research)
  - github       # skills/github_skill.py     (open source)
  # - career     # skills/career_skill.py     (internship hunting)
  # - custom     # skills/custom_skill.py     (your own)

# ── EMAIL CONFIG ──────────────────────────────────────────────
# Controls email skill behavior.
# Credentials must be in .env: RAKBOT_GMAIL_EMAIL, RAKBOT_GMAIL_PASSWORD

email:
  require_approval: true   # set false for fully autonomous email sending

# ── EXECUTOR CONFIG ───────────────────────────────────────────
# Controls the code execution skill.

executor:
  allow_dangerous: false   # true to allow os.system, subprocess, etc.
  timeout: 10              # max seconds per code execution

# ── POLICY OVERRIDES ──────────────────────────────────────────
# Override default policy limits here.

policy:
  outreach_per_day: 5
  outreach_per_week: 20
  llm_calls_per_day: 150
  search_calls_per_hour: 10
