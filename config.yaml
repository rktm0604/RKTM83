# ─────────────────────────────────────────────────────────────
# RKTM83 — Personal Autonomous Agent
# Edit this file to change everything about the agent.
# No code changes needed.
# ─────────────────────────────────────────────────────────────

agent:
  name: "RKTM83"
  version: "1.0"
  memory_path: "./rktm83_memory"
  policy_path: "./policy.yaml"
  cycle_sleep: 30        # seconds between cycles (300 = 5 min)
  log_level: "INFO"

